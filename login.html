<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Page</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(to right,#4facfe,#00f2fe);
}

.login-box{
background:white;
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
margin-bottom:20px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid gray;
font-size:16px;
}

button{
padding:12px 20px;
background:#0077ff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
width:100%;
margin-top:10px;
}

button:hover{
background:#0056cc;
}

</style>

</head>

<body>

<div class="login-box">

<h1>Student Login 🔐</h1>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<p id="result"></p>

</div>
<script>

async function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

const response = await fetch(
"http://localhost:3000/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
password
})
}
);

const data = await response.json();

document.getElementById("result").innerText =
data.message;

}

</script>

</body>

</html>
